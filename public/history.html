<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan | History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-darkbg text-white min-h-screen">
    <nav class="bg-cardbg border-b border-primary/20">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-2xl font-bold">
                        <span class="text-primary">Nutri</span><span class="text-secondary">Scan</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-400 hover:text-white">Dashboard</a>
                    <button id="logoutButton" class="bg-danger hover:bg-red-700 text-white px-4 py-2 rounded-lg">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">Analysis History</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="btn btn-primary">Export Data</button>
                <button onclick="clearHistory()" class="btn btn-danger">Clear All</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="flash-card mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="filterMethod" class="form-input" onchange="loadHistory()">
                    <option value="">All Methods</option>
                    <option value="text">Text Input</option>
                    <option value="image">Image Upload</option>
                    <option value="camera">Camera</option>
                </select>
                <select id="filterMatch" class="form-input" onchange="loadHistory()">
                    <option value="">All Scores</option>
                    <option value="90-100">Excellent (90-100%)</option>
                    <option value="75-89">Good (75-89%)</option>
                    <option value="50-74">Fair (50-74%)</option>
                    <option value="0-49">Poor (0-49%)</option>
                </select>
                <input type="date" id="filterDate" class="form-input" onchange="loadHistory()">
                <input type="text" id="filterSearch" class="form-input" placeholder="Search food..." oninput="loadHistory()">
            </div>
        </div>

        <!-- History List -->
        <div id="historyList" class="space-y-4">
            <div class="text-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto"></div>
                <p class="mt-2 text-gray-400">Loading history...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="flex justify-center mt-8 hidden">
            <!-- Pagination will be loaded here -->
        </div>
    </div>

    <script src="js/history.js"></script>
</body>
</html>
